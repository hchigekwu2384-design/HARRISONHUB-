<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Premium Minimalist Goods</title>
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 8%;
            background-color: #f8f9fa;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #000000;
        }

        nav {
            display: flex;
            gap: 32px;
        }

        nav a {
            text-decoration: none;
            color: #666666;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #000000;
        }

        .cart-btn {
            background-color: #3b4cca;
            color: #ffffff;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cart-btn:hover {
            background-color: #2a3ab0;
        }

        /* Hero Section */
        .hero-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            max-width: 1400px;
            margin: auto;
            padding: 40px 8% 80px 8%;
            gap: 60px;
            flex-grow: 1;
        }

        /* Left Content Column */
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .tagline {
            color: #3b4cca;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            color: #222222;
            margin-bottom: 24px;
        }

        .hero-description {
            font-size: 16px;
            line-height: 1.6;
            color: #666666;
            margin-bottom: 36px;
            max-width: 440px;
        }

        .cta-btn {
            background-color: #3b4cca;
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cta-btn:hover {
            background-color: #2a3ab0;
        }

        /* Right Image/Placeholder Column */
        .image-container {
            background-color: #dbe0e6;
            border-radius: 24px;
            aspect-ratio: 1.2 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .placeholder-text {
            color: #3b4cca;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
                padding-top: 20px;
            }

            .hero-content {
                align-items: center;
            }

            header {
                padding: 20px 4%;
            }

            nav {
                display: none; /* Simplifies mobile view layout */
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo">AURA</div>
        <nav>
            <a href="#">Shop All</a>
            <a href="#">New Arrivals</a>
            <a href="#">Categories</a>
            <a href="#">Support</a>
        </nav>
        <button class="cart-btn">Cart (0)</button>
    </header>

    <!-- Hero Section -->
    <main class="hero-container">
        <!-- Text Content -->
        <section class="hero-content">
            <span class="tagline">Summer Collection 2026</span>
            <h1 class="hero-title">Designed for the<br>minimalist lifestyle.</h1>
            <p class="hero-description">
                Upgrade your daily essentials with our precision-engineered tech accessories and premium lifestyle gear.
            </p>
            <button class="cta-btn">Explore Products</button>
        </section>

        <!-- Graphic Placeholder -->
        <section class="image-container">
            <div class="placeholder-text">
                ✨ Modern Tech Gadget Placeholder
            </div>
        </section>
    </main>

</body>
</html>
